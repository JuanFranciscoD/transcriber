<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Transcriber</title>
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180x180.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Transcriber" />
<meta name="theme-color" content="#ffffff" />
<style>
:root {
  --bg: #ffffff;
  --bg-subtle: #f8f9fa;
  --bg-muted: #f1f3f5;
  --border: #e9ecef;
  --border-strong: #dee2e6;
  --text: #0d0d0d;
  --text-muted: #6c757d;
  --text-placeholder: #adb5bd;
  --accent: #0d0d0d;
  --accent-fg: #ffffff;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; color: var(--text); font-size: 15px; line-height: 1.5; }

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── TOPBAR ── */
.topbar { padding: 16px 16px 12px; display: flex; align-items: center; gap: 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
.topbar h1 { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; flex: 1; }
.back-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; background: none; color: var(--text-muted); cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.back-btn:active { background: var(--bg-muted); }
.icon-btn { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: var(--radius-sm); border: none; background: none; color: var(--text-muted); cursor: pointer; transition: background 0.15s, color 0.15s; flex-shrink: 0; }
.icon-btn:active { background: var(--bg-muted); color: var(--text); }
.auth-btn { display: flex; align-items: center; gap: 6px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; font-weight: 500; color: var(--text); background: var(--bg); cursor: pointer; white-space: nowrap; transition: background 0.15s; }
.auth-btn:active { background: var(--bg-muted); }
.auth-btn img { width: 18px; height: 18px; border-radius: 50%; }

/* ── CONTENT ── */
.content { flex: 1; padding: 16px; overflow-y: auto; }

/* ── UPLOAD ── */
.upload-card { border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: border-color 0.2s, background 0.2s; }
.upload-card:active { background: var(--bg-subtle); border-color: var(--accent); }
.upload-icon-wrap { width: 52px; height: 52px; background: var(--accent); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.upload-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.upload-card p { font-size: 12px; color: var(--text-placeholder); letter-spacing: 0.2px; }
#file-input { display: none; }

/* ── SECTION LABEL ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; margin-top: 4px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text-placeholder); letter-spacing: 0.7px; text-transform: uppercase; }

/* ── FOLDER CARD ── */
.folder-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg-subtle); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; border: 1px solid var(--border); transition: background 0.15s; }
.folder-item:active { background: var(--bg-muted); }
.folder-icon-wrap { width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--bg-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-muted); }
.folder-info { flex: 1; min-width: 0; }
.folder-info h3 { font-size: 14px; font-weight: 500; color: var(--text); }
.folder-info p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.folder-chevron { color: var(--text-placeholder); }

/* ── NOTE ITEM ── */
.note-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.note-item:last-child { border-bottom: none; }
.note-item:active { opacity: 0.6; }
.note-thumb { width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--bg-muted); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; border: 1px solid var(--border); }
.note-info { flex: 1; min-width: 0; }
.note-info h3 { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.note-chevron { color: var(--text-placeholder); flex-shrink: 0; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 56px 20px; }
.empty-icon { width: 56px; height: 56px; border-radius: var(--radius); background: var(--bg-muted); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; color: var(--text-placeholder); }
.empty-state p { font-size: 14px; color: var(--text-placeholder); }

/* ── PROCESSING ── */
.processing-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; text-align: center; }
.spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.processing-wrap h2 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.processing-wrap p { font-size: 13px; color: var(--text-muted); }
.progress-wrap { width: 100%; max-width: 260px; background: var(--bg-muted); border-radius: 99px; height: 2px; margin-top: 24px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

/* ── DETAIL ── */
.detail-title-row { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.detail-title-row h1 { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; letter-spacing: -0.2px; }
.edit-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: var(--radius-sm); border: none; background: none; color: var(--text-muted); cursor: pointer; flex-shrink: 0; }
.edit-btn:active { background: var(--bg-muted); }

/* ── TABS ── */
.tabs { display: flex; background: var(--bg-muted); border-radius: var(--radius-sm); padding: 3px; margin: 14px 16px; }
.tab { flex: 1; padding: 7px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.2s; }
.tab.active { background: var(--bg); color: var(--text); box-shadow: var(--shadow-sm); }

/* ── TAB CONTENT ── */
.tab-content { padding: 0 16px 100px; }
.section-title { font-size: 11px; font-weight: 600; color: var(--text-placeholder); letter-spacing: 0.7px; text-transform: uppercase; margin: 18px 0 8px; }
.section-title:first-child { margin-top: 4px; }
.bullet { font-size: 14px; color: var(--text); line-height: 1.7; padding: 4px 0 4px 16px; position: relative; }
.bullet::before { content: ""; position: absolute; left: 5px; top: 13px; width: 4px; height: 4px; border-radius: 50%; background: var(--border-strong); }
.transcript-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; }

/* ── BOTTOM BAR ── */
.bottombar { background: var(--bg); border-top: 1px solid var(--border); padding: 10px 16px 32px; display: flex; gap: 6px; }
.action-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 4px; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.action-btn:active { background: var(--bg-muted); transform: scale(0.97); }
.action-btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.action-btn.primary:active { opacity: 0.85; }
.action-btn svg { flex-shrink: 0; }

/* ── SHEET ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 99; display: none; backdrop-filter: blur(2px); }
.overlay.open { display: block; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-radius: var(--radius-xl) var(--radius-xl) 0 0; border-top: 1px solid var(--border); padding: 16px 16px 48px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); z-index: 100; max-height: 80vh; overflow-y: auto; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 32px; height: 3px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 18px; }
.sheet h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.sheet-option { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; width: 100%; text-align: left; transition: opacity 0.15s; }
.sheet-option:last-child { border-bottom: none; }
.sheet-option:active { opacity: 0.6; }
.opt-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--bg-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-muted); }
.sheet-option-label { font-size: 14px; color: var(--text); font-weight: 500; }

/* ── MODAL ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-backdrop.open { display: flex; }
.modal { background: var(--bg); border-radius: var(--radius-lg); padding: 22px 20px; width: 100%; max-width: 340px; box-shadow: var(--shadow-lg); }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.modal input { width: 100%; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 14px; color: var(--text); outline: none; margin-bottom: 14px; background: var(--bg); transition: border-color 0.15s; }
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button { flex: 1; padding: 11px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.modal-cancel { background: var(--bg-muted); color: var(--text); }
.modal-ok { background: var(--accent); color: var(--accent-fg); }
.modal-cancel:active, .modal-ok:active { opacity: 0.8; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); border-radius: 99px; padding: 9px 18px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 300; box-shadow: var(--shadow); }
.toast.show { opacity: 1; }

/* ── ERROR ── */
.error-detail { font-size: 13px; color: var(--text-muted); margin-top: 10px; text-align: center; line-height: 1.6; max-width: 280px; }
.error-icon { width: 56px; height: 56px; border-radius: var(--radius); background: #fff5f5; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }

/* ── EMOJI PICKER ── */
.emoji-picker { position: fixed; background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 10px; z-index: 250; box-shadow: var(--shadow-lg); width: 256px; }
.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.emoji-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px 3px; border-radius: 6px; text-align: center; line-height: 1; transition: background 0.1s; }
.emoji-btn:active { background: var(--bg-muted); }

/* ── BTN PRIMARY (standalone) ── */
.btn-primary { background: var(--accent); color: var(--accent-fg); border: none; border-radius: var(--radius-sm); padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn-primary:active { opacity: 0.8; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-placeholder); pointer-events: none; }
.search-input { width: 100%; background: var(--bg-muted); border: 1px solid transparent; border-radius: var(--radius-sm); padding: 9px 12px 9px 34px; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s, background 0.15s; }
.search-input:focus { background: var(--bg); border-color: var(--border-strong); }
.search-input::placeholder { color: var(--text-placeholder); }

/* ── WAVEFORM ── */
.waveform { display: flex; align-items: center; justify-content: center; gap: 3px; height: 36px; margin-bottom: 20px; }
.waveform-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: wave 1.2s ease-in-out infinite; }
.waveform-bar:nth-child(1) { animation-delay: 0s; }
.waveform-bar:nth-child(2) { animation-delay: 0.1s; }
.waveform-bar:nth-child(3) { animation-delay: 0.2s; }
.waveform-bar:nth-child(4) { animation-delay: 0.3s; }
.waveform-bar:nth-child(5) { animation-delay: 0.4s; }
.waveform-bar:nth-child(6) { animation-delay: 0.2s; }
.waveform-bar:nth-child(7) { animation-delay: 0.1s; }
@keyframes wave {
  0%, 100% { height: 6px; opacity: 0.3; }
  50% { height: 28px; opacity: 1; }
}

/* ── SWIPE TO DELETE ── */
.note-item-wrap { position: relative; overflow: hidden; border-radius: var(--radius-sm); }
.note-item-wrap .delete-reveal { position: absolute; right: 0; top: 0; bottom: 0; width: 72px; background: #fa5252; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 500; gap: 4px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.note-item-wrap .note-item { background: var(--bg); transition: transform 0.2s ease; touch-action: pan-y; border-bottom: 1px solid var(--border); border-radius: 0; }
.note-item-wrap:last-child .note-item { border-bottom: none; }
.note-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.note-duration { font-size: 11px; color: var(--text-placeholder); background: var(--bg-muted); border-radius: 4px; padding: 1px 5px; font-weight: 500; }
</style>
</head>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <h1>Transcriber</h1>
    <button class="icon-btn" onclick="loadFromFirebase()" title="Sincronizar">
      <svg width="18" height="18"><use href="#ic-refresh"/></svg>
    </button>
    <button class="icon-btn" onclick="openNewFolder()" title="Nueva carpeta">
      <svg width="18" height="18"><use href="#ic-folder-plus"/></svg>
    </button>
    <button class="auth-btn" id="auth-btn" onclick="handleAuthClick()">
      <img id="auth-avatar" src="" style="display:none"/>
      <svg id="auth-icon" width="14" height="14"><use href="#ic-user"/></svg>
      <span id="auth-label">Entrar</span>
    </button>
  </div>

async function handleAuthClick() {

}

async function loadFromFirebase() {
  if (!db) return;
  try {
    var { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js');
    var snap = await getDoc(doc(db, 'users', getUserId()));
    if (snap.exists()) {
      var data = snap.data();
      if (data.notes) { notes = data.notes; localStorage.setItem('transcriber-notes', JSON.stringify(notes)); }
      if (data.folders) { folders = data.folders; localStorage.setItem('transcriber-folders', JSON.stringify(folders)); }
      renderHome();

}

function renderHome() {

      html += '<div class="section-header"><span class="section-label">' + results.length + ' resultado' + (results.length !== 1 ? 's' : '') + '</span></div>';

      html += '<div class="section-header"><span class="section-label">Carpetas</span></div>';

          '<span class="folder-chevron"><svg width="16" height="16"><use href="#ic-chevron-right"/></svg></span>' +
          '</div>';

/* ── SWIPE TO DELETE ── */
function attachSwipeHandlers() {
  document.querySelectorAll('.note-item-wrap').forEach(function(wrap) {
    var item = wrap.querySelector('.note-item');
    var startX = 0, startY = 0, isDragging = false, currentX = 0;
    var THRESHOLD = 60;

    item.addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      isDragging = false;
    }, { passive: true });

    item.addEventListener('touchmove', function(e) {
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;
      if (!isDragging && Math.abs(dy) > Math.abs(dx)) return; // scroll vertical
      isDragging = true;
      currentX = Math.min(0, dx);
      item.style.transform = 'translateX(' + currentX + 'px)';
      item.style.transition = 'none';
    }, { passive: true });

    item.addEventListener('touchend', function() {
      if (!isDragging) return;
      item.style.transition = 'transform 0.2s ease';
      if (currentX < -THRESHOLD) {
        item.style.transform = 'translateX(-72px)';
        // tap en delete-reveal confirma
        var reveal = wrap.querySelector('.delete-reveal');
        reveal.onclick = function() {
          var id = wrap.dataset.id;
          notes = notes.filter(function(n){ return n.id !== id; });
          save(); renderHome(); if (currentFolderId) renderFolderNotes();
          showToast('Nota eliminada');
        };
      } else {
        item.style.transform = 'translateX(0)';
      }
      currentX = 0;
    });
  });
}

/* ── PROCESAR AUDIO ── */
function handleFile(input) {
  var file = input.files[0];
  if (!file) return;
  processAudio(file, GROQ_KEY);
  input.value = '';
}

function formatDuration(seconds) {
  if (!seconds || isNaN(seconds)) return null;
  var m = Math.floor(seconds / 60);
  var s = Math.floor(seconds % 60);
  return m > 0 ? m + ' min' + (s > 0 ? ' ' + s + 's' : '') : s + 's';
}

async function processAudio(file, groqKey) {
  showScreen('process');
  setProgress(15, 'Transcribiendo...', file.name);

  // Obtener duración del audio
  var duration = null;
  try {
    var audioURL = URL.createObjectURL(file);
    await new Promise(function(resolve) {
      var audio = new Audio(audioURL);
      audio.onloadedmetadata = function() { duration = formatDuration(audio.duration); URL.revokeObjectURL(audioURL); resolve(); };
      audio.onerror = resolve;
      setTimeout(resolve, 2000);
    });
  } catch(e) {}
  try {
    var formData = new FormData();
    formData.append('file', file, file.name);
    formData.append('model', 'whisper-large-v3-turbo');
    formData.append('language', 'es');
    formData.append('response_format', 'text');
    formData.append('temperature', '0');
    var groqResp = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + groqKey }, body: formData
    });
    if (!groqResp.ok) { var errText = await groqResp.text(); throw new Error('Error al transcribir.\n\n' + errText.substring(0, 200)); }
    var transcripcion = await groqResp.text();
    setProgress(60, 'Generando resumen...', '');
    var llamaResp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + groqKey },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile', max_tokens: 1024,
        messages: [{ role: 'user', content: 'Analizá esta transcripción de audio y generá un resumen ejecutivo estructurado en JSON.\n\nTranscripción:\n' + transcripcion + '\n\nDevolvé SOLO un JSON válido con este formato exacto:\n{\n  "titulo": "título descriptivo corto (máx 5 palabras)",\n  "icono": "un emoji relevante al tema",\n  "secciones": [\n    {\n      "titulo": "Nombre de sección",\n      "puntos": ["punto 1", "punto 2"]\n    }\n  ]\n}' }]
      })
    });
    if (!llamaResp.ok) { var llamaErr = await llamaResp.text(); throw new Error('Error al generar resumen.\n\n' + llamaErr.substring(0, 200)); }
    var llamaData = await llamaResp.json();
    var rawText = llamaData.choices[0].message.content;
    var resumenObj;
    try { var jsonMatch = rawText.match(/\{[\s\S]*\}/); resumenObj = JSON.parse(jsonMatch ? jsonMatch[0] : rawText); }
    catch(e) { resumenObj = { titulo: file.name, icono: '🎙️', secciones: [{ titulo: 'Resumen', puntos: [rawText] }] }; }
    setProgress(95, 'Guardando...', '');
    var nota = {
      id: Date.now().toString(),
      title: resumenObj.titulo || file.name,
      icon: resumenObj.icono || '🎙️',
      date: new Date().toLocaleDateString('es-AR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }),
      duration: duration,
      resumen: resumenObj, transcripcion: transcripcion
    };
    notes.unshift(nota); save(); renderHome();
    currentNoteId = nota.id; detailFromFolder = false;
    document.getElementById('detail-title').textContent = nota.title;
    renderResumen(nota.resumen);
    document.getElementById('tab-content-transcripcion').innerHTML = '<p class="transcript-text">' + escHtml(nota.transcripcion) + '</p>';
    switchTab('resumen'); showScreen('detail');
  } catch(e) { document.getElementById('error-msg').textContent = e.message; showScreen('error'); }
}

function setProgress(pct, title, sub) {
  document.getElementById('process-title').textContent = title;
  document.getElementById('process-sub').textContent = sub;
  document.getElementById('progress-bar').style.width = pct + '%';
}

/* ── SHARE / COPY ── */
function copyCurrentNote() {
  var note = notes.find(function(n){ return n.id === currentNoteId; });
  if (!note) return;
  var text = currentTab === 'resumen' && note.resumen && note.resumen.secciones
    ? note.resumen.secciones.map(function(s){ return s.titulo.toUpperCase()+'\n'+(s.puntos||[]).map(function(p){return '– '+p;}).join('\n'); }).join('\n\n')
    : (note.transcripcion || '');
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ showToast('Copiado ✓'); }); }
}

function openShareSheet() {
  document.getElementById('share-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function shareOption(type) {
  closeAllSheets();
  var note = notes.find(function(n){ return n.id === currentNoteId; });
  if (!note) return;
  var text = type === 'resumen' && note.resumen && note.resumen.secciones
    ? note.title+'\n\n'+note.resumen.secciones.map(function(s){ return s.titulo.toUpperCase()+'\n'+(s.puntos||[]).map(function(p){return '– '+p;}).join('\n'); }).join('\n\n')
    : (note.transcripcion || '');
  if (navigator.share) { navigator.share({ text: text }).catch(function(){}); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ showToast('Copiado ✓'); }); }
}

function closeAllSheets() {
  document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('open'); });
  document.getElementById('overlay').classList.remove('open');
}

/* ── MODAL ── */
function openModal(title, value, placeholder, callback) {
  document.getElementById('modal-title').textContent = title;
  var input = document.getElementById('modal-input');
  input.value = value || ''; input.placeholder = placeholder || '';
  modalCallback = callback;
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(function(){ input.focus(); input.select(); }, 100);
}
function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); modalCallback = null; }
function modalConfirm() { var val = document.getElementById('modal-input').value; var cb = modalCallback; closeModal(); if (cb) cb(val); }
document.getElementById('modal-input').addEventListener('keydown', function(e){ if (e.key === 'Enter') modalConfirm(); if (e.key === 'Escape') closeModal(); });

/* ── TOAST ── */
function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

/* ── EMOJI PICKER ── */
var EMOJIS = [
  '🎙️','📋','🏢','💡','📝','✅','⭐','🔥','📌','🏠','👤','💼','🎯','📊','🗂️',
  '🏗️','🔑','💰','📅','⏰','🚗','✈️','🌍','📞','💬','🤝','👥','🏦','🏥','🎓',
  '🛒','📦','🔧','⚙️','💻','📱','🎵','🎬','📸','🌟','❤️','😊','🙏','👍','🚀',
  '🌱','☀️','🌙','⚡','🎉','🎁','🍕','☕','🏋️','📖'
];
var emojiPickerNoteId = null;

function openEmojiPicker(noteId, anchorEl) {
  emojiPickerNoteId = noteId;
  var picker = document.getElementById('emoji-picker');
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(function(e){
    return '<button class="emoji-btn" onclick="selectEmoji(\'' + e + '\')">' + e + '</button>';
  }).join('');
  var rect = anchorEl.getBoundingClientRect();
  var top = rect.bottom + 8; var left = rect.left;
  if (left + 256 > window.innerWidth) left = window.innerWidth - 266;
  if (top + 200 > window.innerHeight) top = rect.top - 208;
  picker.style.top = top + 'px'; picker.style.left = left + 'px'; picker.style.display = 'block';
  setTimeout(function(){ document.addEventListener('click', closeEmojiPickerOutside, { once: true }); }, 10);
}

function selectEmoji(emoji) {
  var note = notes.find(function(n){ return n.id === emojiPickerNoteId; });
  if (note) { note.icon = emoji; save(); renderHome(); if (currentFolderId) renderFolderNotes(); }
  closeEmojiPicker();
}
function closeEmojiPicker() { document.getElementById('emoji-picker').style.display = 'none'; emojiPickerNoteId = null; }
function closeEmojiPickerOutside(e) {
  var picker = document.getElementById('emoji-picker');
  if (!picker.contains(e.target)) closeEmojiPicker();
  else document.addEventListener('click', closeEmojiPickerOutside, { once: true });
}
